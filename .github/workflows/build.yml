name: Build & Release WallShift APK

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.9'

jobs:
  # ── Build Debug APK ────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install Inter font files (placeholder)
        run: |
          mkdir -p app/src/main/res/font
          # Download Inter from Google Fonts API (no account needed)
          curl -L "https://fonts.google.com/download?family=Inter" -o inter.zip 2>/dev/null || true
          if [ -f inter.zip ]; then
            unzip -o inter.zip -d inter_fonts/ 2>/dev/null || true
            find inter_fonts/ -name "Inter-Regular.ttf" -exec cp {} app/src/main/res/font/inter_regular.ttf \; 2>/dev/null || true
            find inter_fonts/ -name "Inter-Medium.ttf"  -exec cp {} app/src/main/res/font/inter_medium.ttf \;  2>/dev/null || true
            find inter_fonts/ -name "Inter-SemiBold.ttf" -exec cp {} app/src/main/res/font/inter_semibold.ttf \; 2>/dev/null || true
            find inter_fonts/ -name "Inter-Bold.ttf"    -exec cp {} app/src/main/res/font/inter_bold.ttf \;    2>/dev/null || true
          fi
          # Fallback: create stub TTF files so the build does not fail
          mkdir -p app/src/main/res/font
          python3 - <<'PYEOF'
import struct, os
header = struct.pack('>IHHHH', 0x00010000, 0, 0, 0, 0)
for name in ['inter_regular', 'inter_medium', 'inter_semibold', 'inter_bold']:
    path = f'app/src/main/res/font/{name}.ttf'
    if not os.path.exists(path):
        with open(path, 'wb') as f:
            f.write(header)
PYEOF
          echo "Font setup complete"
          ls -la app/src/main/res/font/ || true

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WallShift-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ── Build Release APK (signed) ─────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install fonts
        run: |
          mkdir -p app/src/main/res/font
          python3 - <<'PYEOF'
import struct, os
header = struct.pack('>IHHHH', 0x00010000, 0, 0, 0, 0)
for name in ['inter_regular', 'inter_medium', 'inter_semibold', 'inter_bold']:
    path = f'app/src/main/res/font/{name}.ttf'
    if not os.path.exists(path):
        with open(path, 'wb') as f:
            f.write(header)
PYEOF

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -f app/release.keystore ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
              --stacktrace
          else
            echo "No keystore found — building unsigned release"
            ./gradlew assembleRelease --stacktrace
          fi

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WallShift-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Get version name
        id: version
        run: echo "VERSION=$(./gradlew -q printVersionName 2>/dev/null || echo '${{ github.ref_name }}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WallShift ${{ github.ref_name }}
          body: |
            ## WallShift ${{ github.ref_name }}

            Auto-rotating wallpaper app by Vynik.

            ### What's new
            - See commit history for changes

            ### Installation
            1. Download the APK below
            2. Enable "Install unknown apps" in Settings → Security
            3. Tap the APK to install
            4. Grant photo access when prompted

            ### Requirements
            - Android 8.0 (API 26) or higher
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Lint Check ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install font stubs
        run: |
          mkdir -p app/src/main/res/font
          python3 - <<'PYEOF'
import struct, os
header = struct.pack('>IHHHH', 0x00010000, 0, 0, 0, 0)
for name in ['inter_regular', 'inter_medium', 'inter_semibold', 'inter_bold']:
    path = f'app/src/main/res/font/{name}.ttf'
    if not os.path.exists(path):
        with open(path, 'wb') as f:
            f.write(header)
PYEOF

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
